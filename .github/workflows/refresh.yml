name: Refresh feeds

# Keeps feeds.json up to date on the live site (Shorts, recent videos, live status)
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes (GitHub may delay scheduled runs)
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-feeds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build feeds.json
        run: python3 build_feeds.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          if git diff --cached --quiet; then
            echo "feeds.json unchanged — nothing to commit."
          else
            git commit -m "chore: auto-refresh feeds.json"
            git push
          fi
